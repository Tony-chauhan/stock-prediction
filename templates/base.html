<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="StockPredict - ML-powered stock market prediction platform by Dharmender Chauhan">
  <title>{% block title %}StockPredict{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top app-nav">
    <div class="container">
      <a class="navbar-brand brand" href="{{ url_for('index') }}">
        <span class="brand-mark">◈</span> StockPredict
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <div class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
          <a class="nav-link" href="{{ url_for('compare') }}">Compare</a>
          <a class="nav-link" href="{{ url_for('watchlist') }}">Watchlist</a>
          <button id="theme-toggle" class="btn btn-theme btn-sm ms-lg-2" aria-label="Toggle theme">
            <span class="theme-icon">🌙</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container pb-5 fade-in">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    <div class="container text-center">
      <p class="mb-1">Developed by <strong class="footer-author">Dharmender Chauhan</strong></p>
      <p class="small text-secondary mb-0">StockPredict &middot; Educational use only — not financial advice.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
